schema @link(url: "https://specs.apollo.dev/federation/v2.0", import: ["@key"]) {
  query: Query
}

type Movie @key(fields: "id") {
  id: Int!
  title: String
  releaseDate: String
  releaseYear: Int
  genre: String
  runtime: Int
  overview: String
}

type Query {
  _entities(representations: [_Any!]!): [_Entity]!
  _service: _Service!
  movieContent(id: Int!): Movie
}

scalar _Any

union _Entity = Movie

type _Service {
  sdl: String!
}